# =====================================================
# VIVERE PLATFORM - ORQUESTRAÇÃO DE SERVIÇOS BACKEND
# Enterprise Production Edition - Revisão Platinum
# =====================================================
#
# Uso:
#   docker compose up -d [service...]
#
# Notas:
#   - A rede 'backend-network' é externa (deve existir ou ser criada manualmente).
#   - Os bancos de dados PostgreSQL são definidos em um docker-compose separado:
#     ../docker-postgresql-v16/docker-compose.yml
#   - Cada serviço usa multi-stage Dockerfile otimizado e entrypoint seguro.
#   - Healthchecks padronizados com wget (leve e eficaz).
#   - Configurações de segurança: read_only, tmpfs, no-new-privileges.
#   - Limites de recursos definidos (CPU 0.5, memória 512MB) - ajustáveis.
#
# =====================================================

networks:
  backend-network:
    external: true

x-service-defaults: &service-defaults
  networks:
    - backend-network
  read_only: true
  tmpfs:
    - /tmp
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: "0.50"
        memory: 512M
  healthcheck:
    test: ["CMD", "wget", "--spider", "http://localhost:3000/health"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 20s

services:

  identity-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/backend/identity-service/Dockerfile
    container_name: identity-service
    env_file: ./apps/backend/identity-service/.env
    ports:
      - "3001:3000"

  auth-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/backend/auth-service/Dockerfile
    container_name: auth-service
    env_file: ./apps/backend/auth-service/.env
    ports:
      - "3002:3000"

  warehouse-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/backend/warehouse-service/Dockerfile
    container_name: warehouse-service
    env_file: ./apps/backend/warehouse-service/.env
    ports:
      - "3003:3000"

  service-order-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/backend/service-order-service/Dockerfile
    container_name: service-order-service
    env_file: ./apps/backend/service-order-service/.env
    ports:
      - "3004:3000"

  logistics-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/backend/logistics-service/Dockerfile
    container_name: logistics-service
    env_file: ./apps/backend/logistics-service/.env
    ports:
      - "3005:3000"

  api-gateway:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/backend/api-gateway/Dockerfile
    container_name: api-gateway
    env_file: ./apps/backend/api-gateway/.env
    ports:
      - "3000:3000"

  # ----------------- PGADMIN TOOL -----------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-vivere
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@vivere.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "15432:80"
    networks:
      - backend-network
    restart: unless-stopped