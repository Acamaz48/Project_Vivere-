# ============================================================
# VIVERE PLATFORM – PostgreSQL Multi-Database Infrastructure
# Enterprise Production Edition – Revisão Platinum
# ============================================================
#
# Uso:
#   docker compose --profile <perfil> up -d
#   Perfis: auth, identity, logistics, service-order, warehouse
#
# Notas:
#   - A rede 'backend-network' é externa (deve ser criada antes)
#   - Cada banco tem volume persistente separado por ambiente (SEED_ENV)
#   - Scripts de seed são executados automaticamente na primeira inicialização
#   - Healthchecks configurados para verificar prontidão
#   - Parâmetros de performance são passados via command (valores do .env)
#   - É necessário um arquivo .env neste diretório com as variáveis:
#       POSTGRES_USER, POSTGRES_PASSWORD (opcional), SEED_ENV (development/staging/production)
#
# ============================================================

networks:
  backend-network:
    external: true   # Criar antes: docker network create backend-network

# ============================================================
# SERVIÇOS
# ============================================================

services:

  # ----------------- AUTH DATABASE -----------------
  auth-db:
    build:
      context: ./auth
      dockerfile: Dockerfile
    container_name: auth-db
    profiles: ["auth"]
    env_file:
      - .env
    environment:
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - ./auth/data/${SEED_ENV}:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}
      -c work_mem=${POSTGRES_WORK_MEM:-16MB}
      -c maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}
      -c max_connections=${POSTGRES_MAX_CONNECTIONS:-200}
      -c wal_buffers=${POSTGRES_WAL_BUFFERS:-16MB}

  # ----------------- IDENTITY DATABASE -----------------
